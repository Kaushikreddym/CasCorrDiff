
hydra:
    job:
          chdir: false
          name: generate_mswxdwd
    run:
          dir: ./outputs/${hydra:job.name}
    searchpath:
          - pkg://conf/base # Do not modify

# Base parameters for dataset, model, and generation
defaults:

    - dataset: mswxdwd
    # The dataset type for generation.

    - generation: non_patched
    # The base generation parameters.
    # Accepted values:
    #     `patched`: base parameters for a patch-based model (for full domain generation)
    #     `non_patched`: base parameters for a non-patched model


# Dataset parameters. Used for `mswxdwd` dataset type.
# Modify or add below parameters that should be passed as argument to the
# user-defined dataset class.
dataset:
    data_path: /beegfs/muduchuru/data/
    stats_dwd: /beegfs/muduchuru/data/hyras/hyras_stats.json
    stats_mswx: /beegfs/muduchuru/data/mswx/mswx_stats.json
    center_latlon: [47.63, 10.13]  # Center of Germany
    patch_size: [128, 128]  # Extract 128x128 patch at this location
    train: False

# Generation parameters to specialize
generation:
    inference_mode: all
    num_ensembles: 8
    # int, number of ensembles to generate per input
    seed_batch_size: 4
    # int, size of the batched inference (should be num_ensembles / num_gpus)
    
    # Single patch generation - no tiling
    patch_shape_x: null
    patch_shape_y: null
    overlap_pix: null
    boundary_pix: null
    times_range: [2024-01-01T00:00:00, 2024-01-02T00:00:00, 1d]
    times: null
    # times: ['2024-01-01T00:00:00']
    # list of times to evaluate on. Only one of times_range and times should be used.

    io:
        output_path: ./generated
        res_ckpt_filename: checkpoints_diffusion_mswxdwd/checkpoints_diffusion/EDMPrecondSuperResolution.0.860000.mdlus
        reg_ckpt_filename: checkpoints_regression_mswxdwd/checkpoints_regression/UNet.0.865008.mdlus
